spring:
  application:
    name: taskmanager

  datasource:
    url: jdbc:h2:mem:taskdb
    driverClassName: org.h2.Driver
    username: jihad
    password: password
  h2:
    console:
      enable: true
      path: /h2-console

  jpa:
    databasePlatform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true